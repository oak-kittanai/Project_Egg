name: Build Standalone

# Trigger only on push to main/release, or manually.
# Avoid triggering on every PR to conserve free-tier minutes.
on:
  push:
    branches:
      - main
      - release
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────────────────
  # BUILD
  # Uses ubuntu-latest (Linux, 1× minute multiplier — cheapest).
  # Windows runner would cost 2× and macOS 10× the minutes.
  # ──────────────────────────────────────────────────────────────
  build:
    name: Build StandaloneWindows64
    runs-on: ubuntu-latest
    steps:

      # 1. Checkout (with LFS for art assets)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      # 2. Cache Git LFS objects to avoid re-downloading large binaries
      - name: Create LFS file list
        run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id

      - name: Restore LFS cache
        uses: actions/cache@v4
        id: lfs-cache
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('.lfs-assets-id') }}
          restore-keys: lfs-

      - name: Git LFS pull
        run: |
          git lfs pull
          git add .
          git reset --hard

      # 3. Cache Unity Library — the single biggest build-time saver.
      #    A cold build can take 20+ min; warm cache cuts it to ~5 min.
      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-StandaloneWindows64-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-StandaloneWindows64-
            Library-

      # 4. Build
      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 6000.2.6f2
          targetPlatform: StandaloneWindows64
          # Embed the short commit SHA in the build name for traceability
          buildName: ProjectEgg-${{ github.run_number }}

      # 5. Upload artifact — short retention keeps storage within free tier.
      #    The cleanup job below enforces a max of 2 kept artifacts.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Build-StandaloneWindows64-${{ github.run_number }}
          path: build/StandaloneWindows64
          # Keep for 14 days; adjust down to 7 if storage is still tight
          retention-days: 14

  # ──────────────────────────────────────────────────────────────
  # NOTIFY — post download link to Discord after a successful build
  # ──────────────────────────────────────────────────────────────
  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.result == 'success'
    steps:
      - name: Post to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BUILD_NUM: ${{ github.run_number }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          ACTOR: ${{ github.actor }}
        run: |
          # Truncate commit message to keep the embed tidy
          SHORT_MSG="${COMMIT_MSG:0:72}"
          [ "${#COMMIT_MSG}" -gt 72 ] && SHORT_MSG="${SHORT_MSG}…"

          curl -fsSL -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"✅ Build #${BUILD_NUM} สำเร็จแล้ว!\",
                \"description\": \"**Project Egg** — StandaloneWindows64\\n\\n> ${SHORT_MSG}\",
                \"color\": 3066993,
                \"fields\": [
                  {
                    \"name\": \"📦 ดาวน์โหลด Artifact\",
                    \"value\": \"[คลิกที่นี่เพื่อดาวน์โหลด](${RUN_URL})\\n(ต้องล็อกอิน GitHub)\",
                    \"inline\": false
                  },
                  {
                    \"name\": \"Triggered by\",
                    \"value\": \"${ACTOR}\",
                    \"inline\": true
                  },
                  {
                    \"name\": \"Retention\",
                    \"value\": \"14 วัน\",
                    \"inline\": true
                  }
                ],
                \"footer\": { \"text\": \"GitHub Actions • Project Egg\" }
              }]
            }"

  # ──────────────────────────────────────────────────────────────
  # CLEANUP — keep only the 2 most recent artifacts per name prefix
  # to stay inside GitHub's 500 MB free-tier storage quota.
  # ──────────────────────────────────────────────────────────────
  cleanup:
    name: Prune old artifacts (keep 2)
    runs-on: ubuntu-latest
    needs: build
    # Run even if build is skipped but not if it truly failed mid-upload
    if: always() && needs.build.result != 'failure'
    permissions:
      actions: write   # required to delete artifacts
    steps:
      - name: Delete artifacts beyond the 2 most recent
        uses: actions/github-script@v7
        with:
          script: |
            const PREFIX = 'Build-StandaloneWindows64-';
            const KEEP   = 2;

            // Fetch all artifacts for this repo (paginated)
            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 }
            );

            // Filter to the ones created by this workflow
            const relevant = artifacts
              .filter(a => a.name.startsWith(PREFIX))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            const toDelete = relevant.slice(KEEP);

            if (toDelete.length === 0) {
              console.log(`Nothing to prune — ${relevant.length} artifact(s) present, keeping ${KEEP}.`);
              return;
            }

            for (const artifact of toDelete) {
              console.log(`Deleting: ${artifact.name} (id=${artifact.id}, size=${(artifact.size_in_bytes / 1024 / 1024).toFixed(1)} MB)`);
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
            }
            console.log(`Pruned ${toDelete.length} artifact(s). Kept ${Math.min(relevant.length, KEEP)}.`);
