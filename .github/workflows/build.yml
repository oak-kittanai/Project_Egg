name: Build

# Push to main/release → WebGL (deploy to GitHub Pages).
# Manual dispatch → choose platform via input.
on:
  push:
    branches:
      - main
      - release
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: true
        default: 'WebGL'
        type: choice
        options:
          - WebGL
          - StandaloneWindows64
          - Both

jobs:
  # ──────────────────────────────────────────────────────────────
  # STANDALONE — manual dispatch only.
  # Push events build WebGL by default.
  # ──────────────────────────────────────────────────────────────
  build-standalone:
    name: Build StandaloneWindows64
    runs-on: ubuntu-latest
    if: >-
      github.event.inputs.platform == 'StandaloneWindows64' ||
      github.event.inputs.platform == 'Both'
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Create LFS file list
        run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id

      - name: Restore LFS cache
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('.lfs-assets-id') }}
          restore-keys: lfs-

      - name: Git LFS pull
        run: |
          git lfs pull
          git add .
          git reset --hard

      # A cold build can take 20+ min; warm cache cuts it to ~5 min.
      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-StandaloneWindows64-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-StandaloneWindows64-
            Library-

      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:   ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion:   6000.2.6f2
          targetPlatform: StandaloneWindows64
          buildName:      ProjectEgg-${{ github.run_number }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Build-StandaloneWindows64-${{ github.run_number }}
          path: build/StandaloneWindows64
          retention-days: 14

  # ──────────────────────────────────────────────────────────────
  # WEBGL — builds and deploys to GitHub Pages for instant play.
  #
  # Prerequisites (one-time repo setup):
  #   Repo Settings → Pages → Source: Deploy from a branch → gh-pages / root
  #
  # Note: If you use Unity's WebGL compression (Brotli/GZip), GitHub Pages
  #   cannot serve the correct Content-Encoding headers. Disable compression
  #   in Player Settings → Publishing Settings → Compression Format → Disabled.
  # ──────────────────────────────────────────────────────────────
  build-webgl:
    name: Build WebGL + Deploy to GitHub Pages
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.platform == 'WebGL' ||
      github.event.inputs.platform == 'Both'
    permissions:
      contents: write   # required by peaceiris/actions-gh-pages
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Create LFS file list
        run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id

      - name: Restore LFS cache
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('.lfs-assets-id') }}
          restore-keys: lfs-

      - name: Git LFS pull
        run: |
          git lfs pull
          git add .
          git reset --hard

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-WebGL-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-WebGL-
            Library-

      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE:  ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion:   6000.2.6f2
          targetPlatform: WebGL
          buildName:      WebGL   # output → build/WebGL/WebGL/

      # GitHub Pages needs .nojekyll to serve .wasm / Unity files correctly.
      - name: Add .nojekyll
        run: touch build/WebGL/WebGL/.nojekyll

      # Publishes to gh-pages branch; force_orphan keeps branch history lean.
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:  ./build/WebGL/WebGL
          force_orphan: true

  # ──────────────────────────────────────────────────────────────
  # NOTIFY — posts result to Discord; shows play link for WebGL.
  # Uses jq for safe JSON construction (handles special characters).
  # ──────────────────────────────────────────────────────────────
  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: [build-standalone, build-webgl]
    if: >-
      always() &&
      (needs.build-standalone.result == 'success' ||
       needs.build-webgl.result == 'success')
    steps:
      - name: Post to Discord
        env:
          DISCORD_WEBHOOK:   ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_URL:           https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BUILD_NUM:         ${{ github.run_number }}
          COMMIT_MSG:        ${{ github.event.head_commit.message }}
          ACTOR:             ${{ github.actor }}
          STANDALONE_RESULT: ${{ needs.build-standalone.result }}
          WEBGL_RESULT:      ${{ needs.build-webgl.result }}
          REPO_OWNER:        ${{ github.repository_owner }}
          REPO_NAME:         ${{ github.event.repository.name }}
        run: |
          SHORT_MSG="${COMMIT_MSG:0:72}"
          [ "${#COMMIT_MSG}" -gt 72 ] && SHORT_MSG="${SHORT_MSG}…"
          PAGES_URL="https://${REPO_OWNER}.github.io/${REPO_NAME}/"

          # Build fields array with jq so all values are safely escaped.
          FIELDS='[]'

          if [ "$STANDALONE_RESULT" = "success" ]; then
            FIELDS=$(printf '%s' "$FIELDS" | jq --arg u "$RUN_URL" \
              '. + [{"name":"📦 ดาวน์โหลด Standalone","value":"[คลิกที่นี่เพื่อดาวน์โหลด](\($u))\n(ต้องล็อกอิน GitHub)","inline":false}]')
          fi

          if [ "$WEBGL_RESULT" = "success" ]; then
            FIELDS=$(printf '%s' "$FIELDS" | jq --arg u "$PAGES_URL" \
              '. + [{"name":"🎮 เล่นบน Browser (WebGL)","value":"[เล่นได้เลย! คลิกที่นี่](\($u))","inline":false}]')
          fi

          FIELDS=$(printf '%s' "$FIELDS" | jq \
            --arg a "$ACTOR" \
            '. + [{"name":"Triggered by","value":$a,"inline":true},{"name":"Retention","value":"14 วัน","inline":true}]')

          DESC=$(printf '**Project Egg**\n\n> %s' "$SHORT_MSG")
          PAYLOAD=$(jq -n \
            --arg title "✅ Build #${BUILD_NUM} สำเร็จแล้ว!" \
            --arg desc  "$DESC" \
            --argjson fields "$FIELDS" \
            '{embeds:[{title:$title,description:$desc,color:3066993,fields:$fields,footer:{text:"GitHub Actions • Project Egg"}}]}')

          curl -fsSL -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

  # ──────────────────────────────────────────────────────────────
  # CLEANUP — keep only the 2 most recent Standalone artifacts.
  # ──────────────────────────────────────────────────────────────
  cleanup:
    name: Prune old artifacts (keep 2)
    runs-on: ubuntu-latest
    needs: build-standalone
    if: always() && needs.build-standalone.result != 'failure'
    permissions:
      actions: write
    steps:
      - name: Delete artifacts beyond the 2 most recent
        uses: actions/github-script@v7
        with:
          script: |
            const PREFIX = 'Build-StandaloneWindows64-';
            const KEEP   = 2;

            // Fetch all artifacts for this repo (paginated)
            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 }
            );

            // Filter to the ones created by this workflow
            const relevant = artifacts
              .filter(a => a.name.startsWith(PREFIX))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            const toDelete = relevant.slice(KEEP);

            if (toDelete.length === 0) {
              console.log(`Nothing to prune — ${relevant.length} artifact(s) present, keeping ${KEEP}.`);
              return;
            }

            for (const artifact of toDelete) {
              console.log(`Deleting: ${artifact.name} (id=${artifact.id}, size=${(artifact.size_in_bytes / 1024 / 1024).toFixed(1)} MB)`);
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
            }
            console.log(`Pruned ${toDelete.length} artifact(s). Kept ${Math.min(relevant.length, KEEP)}.`);
